name: iOS Build Test

on:
  push:
    branches: [ "main" ] # mainブランチにpushされたら動く

jobs:
  build_ios:
    runs-on: macos-latest # クラウドのMacを使う指示
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Apple Certificate and Provisioning Profiles
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          WIDGET_PROVISION_PROFILE_BASE64: ${{ secrets.WIDGET_PROFILE_BASE64 }} # 🌟 島のプロファイルを追加
          KEYCHAIN_PASSWORD: "temp_runner_password"
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          WIDGET_PP_PATH=$RUNNER_TEMP/widget_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          echo -n "$WIDGET_PROVISION_PROFILE_BASE64" | base64 --decode -o $WIDGET_PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          
          # メインアプリのプロファイル処理
          UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< $(security cms -D -i $PP_PATH))
          REAL_TEAM_ID=$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' /dev/stdin <<< $(security cms -D -i $PP_PATH))
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          
          # 🌟 島のプロファイル処理
          WIDGET_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< $(security cms -D -i $WIDGET_PP_PATH))
          cp $WIDGET_PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$WIDGET_UUID.mobileprovision
          
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV
          echo "WIDGET_PROFILE_UUID=$WIDGET_UUID" >> $GITHUB_ENV
          echo "TEAM_ID=$REAL_TEAM_ID" >> $GITHUB_ENV

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Run setup_island.rb (Xcode Project Magic)
        # 🌟 ここで魔法のスクリプトを実行して、島をプロジェクトに合体させます！
        run: |
          gem install xcodeproj
          ruby setup_island.rb

      - name: Force Manual Code Signing
        run: |
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          echo "" >> ios/Flutter/Release.xcconfig
          echo "DEVELOPMENT_TEAM=${{ env.TEAM_ID }}" >> ios/Flutter/Release.xcconfig
          echo "PROVISIONING_PROFILE_SPECIFIER=${{ env.PROFILE_UUID }}" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=Apple Development" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_ENTITLEMENTS=Runner/Runner.entitlements" >> ios/Flutter/Release.xcconfig

      - name: Build iOS App
        run: flutter build ios --release

      - name: Create IPA Manually
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload
          cd build/ios/iphoneos
          zip -qr oshiisland.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: oshiisland-app
          path: build/ios/iphoneos/oshiisland.ipa